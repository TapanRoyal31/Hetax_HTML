<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <!-- 
    Table is collection of cells
    Cells is cross section of row and column
    thead is for header of table
    tbody is for body of table
    th is for header cell
    td is for data cell
-->
  <body>
    <table border="1">
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>City</th>
        </tr>
      </thead>
      <tbody>
        <tr>
            <td>Alex</td>
            <td>21</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>John</td>
            <td>25</td>
            <td>Los Angeles</td>
        </tr>
        <tr>
            <td>Emily</td>
            <td>30</td>
            <td>Chicago</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
