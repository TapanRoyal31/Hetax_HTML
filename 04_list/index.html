<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
     <ul>
        <!-- Unorder List -->
         <li> 
            <!-- List Items -->
             HTML
         </li>
         <li>Css</li>
         <li>JS</li>
         <ul>
            <li>Language</li>
            <ul>
                <li>dfghjkl</li>
            </ul>
         </ul>
    </ul> 
    <hr>
    <ol>
        <!-- order list -->
         <li>html</li>
         <ol type="A">
            <li>Css</li>
         </ol>
         <ol type="a">
             <li>js</li>
         </ol>
    </ol>
</body>
</html>
